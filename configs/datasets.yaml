datasets:
  gsm8k:
    name: gsm8k
    domain: math_reasoning
    source_type: hf
    default_split: test
    target_main_count: 8
    metric: exact_match
    description: Grade-school math word problems.
    local_path: data/processed/public/gsm8k.jsonl
    processed_path: data/processed/public/gsm8k.jsonl
    hf_path: openai/gsm8k
    hf_config: main
    hf_split: test
    primary_hf_path: openai/gsm8k
    primary_hf_config: main
    primary_hf_split: test
    hf_candidates:
      - path: openai/gsm8k
        config: main
        split: test
      - path: gsm8k
        config: main
        split: test
    local_raw_candidates:
      - data/raw/public/gsm8k.jsonl
      - data/raw/public/gsm8k.json

